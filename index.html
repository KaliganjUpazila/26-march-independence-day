<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>স্বাধীনতা দিবস ২০২৬ আমন্ত্রণপত্র</title>

<!-- PRELOAD IMAGE -->
<link rel="preload" as="image" href="abc.png">

<style>
@font-face {
    font-family: 'LiKaiumSimanto';
    src: url('LiKaiumSimanto.ttf') format('truetype');
}

/* BODY */
body {
    font-family: 'LiKaiumSimanto', Arial, sans-serif;
    background: linear-gradient(to bottom, #006a4e, #f42a41);
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}

/* WRAPPER */
.wrapper {
    max-width: 800px;
    margin: auto;
}

/* INPUT BOX */
.input-box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    margin-bottom: 30px;
}

.input-box input {
    width: 80%;
    padding: 12px;
    font-size: 16px;
}

.input-box button {
    margin-top: 15px;
    padding: 12px 25px;
    background: #f42a41;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* CARD */
.card {
    display: none;
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease forwards;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* HEADER IMAGE */
.header-img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* TITLE */
.card h2 {
    text-align: center;
    color: #00703c;
}

/* NAME */
.name {
    color: red;
    font-weight: bold;
}

/* SHARE */
.share {
    text-align: center;
    margin-top: 20px;
}

.share a {
    padding: 10px 15px;
    margin: 5px;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.whatsapp { background: green; }
.facebook { background: blue; }
.copy { background: gray; }
</style>
</head>

<body>

<div class="wrapper">

<div class="input-box" id="inputBox">
    <h2>আপনার নাম লিখুন</h2>
    <input type="text" id="username" placeholder="আপনার নাম লিখুন">
    <br>
    <button onclick="generateCard()">আমন্ত্রণপত্র দেখুন</button>
</div>

<div class="card" id="card">

<!-- IMAGE FIXED -->
<img src="abc.png?v=1" class="header-img" alt="স্বাধীনতা দিবস" loading="eager">

<h2>২৬শে মার্চ — স্বাধীনতা ও জাতীয় দিবস ২০২৬</h2>

<p>সুধী <span class="name" id="showName"></span>,</p>

<p>২৬ শে মার্চ মহান স্বাধীনতা দিবস আমাদের গৌরবের দিন...</p>

<br>

<p><strong>এ. টি. এম কামরুল ইসলাম</strong><br>
উপজেলা নির্বাহী অফিসার<br>
কালীগঞ্জ, গাজীপুর</p>

<div class="share">
    <h3>শেয়ার করুন</h3>
    <a class="whatsapp" id="wa" target="_blank">WhatsApp</a>
    <a class="facebook" id="fb" target="_blank">Facebook</a>
    <a class="copy" onclick="copyLink()">লিঙ্ক কপি</a>
</div>

</div>
</div>

<script>
// GENERATE CARD
function generateCard(){
    let name = document.getElementById("username").value.trim();
    if(name==""){ alert("নাম লিখুন"); return; }

    let url = window.location.origin + window.location.pathname + "?name=" + encodeURIComponent(name);
    window.location.href = url;
}

// SHOW CARD
function showCard(name){
    document.getElementById("inputBox").style.display = "none";
    document.getElementById("showName").innerText = name;
    document.getElementById("card").style.display = "block";

    document.getElementById("wa").href =
        "https://wa.me/?text=" + encodeURIComponent("আপনাকে আমন্ত্রণ জানানো হলো: " + window.location.href);

    document.getElementById("fb").href =
        "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(window.location.href);
}

// COPY LINK
function copyLink(){
    navigator.clipboard.writeText(window.location.href);
    alert("লিঙ্ক কপি হয়েছে!");
}

// AUTO LOAD (IMPORTANT FIX)
window.onload = function(){
    let params = new URLSearchParams(window.location.search);
    if(params.get("name")){
        showCard(params.get("name"));
    }
}
</script>

</body>
</html>
